<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Image Carousel</title>
  </head>
  <body>
    <header>
      <h1>Image Carousel Demo</h1>
    </header>

    <main>
      <div class="carousel-container">
        <div class="slides">
          <figure class="slide">
            <img src="./526730.jpg" alt="Cat slide 1" />
          </figure>
          <figure class="slide">
            <img src="./737474.png" alt="Cat slide 2" />
          </figure>
          <figure class="slide">
            <img src="./torii-5889982.jpg" alt="Cat slide 3" />
          </figure>
          <figure class="slide">
            <img src="./wallpaperflare.com_wallpaper (1).jpg" alt="Cat slide 4" />
          </figure>
          <figure class="slide">
            <img src="./wallpaperflare.com_wallpaper (8).jpg" alt="Cat slide 5" />
          </figure>
        </div>
      </div>
    </main>
  </body>
</html>
