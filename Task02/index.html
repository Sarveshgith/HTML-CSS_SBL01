<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>CSS Card Component</title>
  </head>
  <body>
    <!-- Header Section -->
    <header>
      <h1>Sarveswaran Babu</h1>
      <nav>
        <ul>
          <li><a href="#aboutme">About Me</a></li>
          <li><a href="#education">Education</a></li>
          <li><a href="#projects">Projects</a></li>
        </ul>
      </nav>
    </header>

    <!-- Main Body -->
    <main>
      <!-- Card Section -->
      <section id="projects">
        <h2>Projects</h2>

        <!-- Card Component -->
        <div class="card-section">
          <article class="project-card">
            <img src="./Tapscend.png" alt="Tapscend game preview" />
            <div class="desc">
              <h3>Tapscend</h3>
              <p>A simple game for time-pass</p>
              <a href="https://tapscend.netlify.app" target="_blank" rel="noopener noreferrer">View Project</a>
            </div>
          </article>

          <!-- Card Component -->
          <article class="project-card">
            <img src="./Portfolio.png" alt="Portfolio preview" />
            <div class="desc">
              <h3>My Portfolio</h3>
              <p>Personal Portfolio website</p>
              <a href="https://sarveswaran.netlify.app" target="_blank" rel="noopener noreferrer">View Project</a>
            </div>
          </article>

          <!-- Card Component -->
          <article class="project-card">
            <img src="./KPZ.png" alt="KPZ preview" />
            <div class="desc">
              <h3>KPZ Website</h3>
              <p>Website created as a part of Freelancing</p>
              <a href="https://www.karthiplayzone.in" target="_blank" rel="noopener noreferrer">View Project</a>
            </div>
          </article>
        </div>
      </section>
    </main>

    <!-- Footer Section -->
    <footer>
      <p>© 2026 Presidio @ Sarveswaran</p>
    </footer>
  </body>
</html>
